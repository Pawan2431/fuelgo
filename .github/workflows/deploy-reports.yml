name: Deploy Automation Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Android Appium E2E Automation & GitHub Pages Reporting"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE20: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  deploy-pages-manual:
    name: Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Deploy Reports to GitHub Pages (gh-pages Branch)"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: 'automation/reports/HTML'

      - name: "Upload Automation Reports Build Artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation-HTML-Reports-Package
          path: automation/reports/HTML
          retention-days: 30
