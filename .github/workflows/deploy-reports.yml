name: Deploy Automation Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Android Appium E2E Automation & GitHub Pages Reporting"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages-manual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'automation/reports/HTML'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
