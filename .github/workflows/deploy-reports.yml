name: Deploy Automation Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Android Appium E2E Automation & GitHub Pages Reporting"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages-manual:
    name: Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Pages"
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: "Upload Pages Artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'automation/reports/HTML'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
