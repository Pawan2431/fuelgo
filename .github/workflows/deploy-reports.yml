name: Deploy Automation Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Android Appium E2E Automation & GitHub Pages Reporting"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE20: true

jobs:
  deploy-pages-manual:
    name: Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Pages"
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true

      - name: "Upload Pages Artifact"
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: 'automation/reports/HTML'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: "Upload Automation Reports Build Artifact (Fallback)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation-HTML-Reports-Package
          path: automation/reports/HTML
          retention-days: 30
